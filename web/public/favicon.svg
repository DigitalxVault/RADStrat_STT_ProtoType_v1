<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A84B"/>
      <stop offset="50%" stop-color="#B8860B"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="brassLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#D4A84B"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>
  <circle cx="256" cy="256" r="248" fill="none" stroke="#48494B" stroke-width="4"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#2C3539" stroke-width="2"/>
  <!-- Outer gear teeth (16 teeth) -->
  <g filter="url(#glow)">
    <path d="
      M256 36 L270 36 L278 70 L290 68 L306 38 L318 42 L320 76 L332 78 L354 52 L364 60 L360 94 L370 100 L396 80 L404 90 L394 122 L402 130 L432 116 L436 128 L420 156 L426 166 L458 158 L460 170 L438 194 L442 204 L476 204 L474 216 L448 234 L448 246 L482 252 L478 264 L450 276 L448 288 L478 302 L472 314 L442 318 L438 330 L464 350 L456 360 L426 358 L418 368 L440 394 L430 402 L402 392 L392 400 L408 430 L396 436 L372 420 L360 426 L370 458 L356 462 L336 440 L324 444 L328 478 L314 478 L298 452 L286 452 L284 486 L270 484 L260 454 L248 452 L240 484 L226 480 L222 450 L210 446 L196 476 L184 470 L186 440 L174 432 L156 458 L146 450 L154 420 L142 410 L120 432 L112 422 L126 394 L116 382 L90 398 L84 386 L104 362 L96 350 L68 360 L64 346 L88 326 L84 314 L54 318 L52 304 L80 288 L78 276 L48 274 L50 260 L78 250 L78 238 L48 230 L52 218 L82 216 L84 204 L56 190 L62 178 L92 182 L98 170 L74 150 L82 140 L112 150 L120 140 L100 116 L110 108 L138 124 L148 116 L134 88 L146 82 L168 104 L180 98 L172 68 L186 66 L202 92 L214 90 L212 60 L226 60 L236 88 L248 88 L242 56 Z"
      fill="url(#brass)" stroke="#8B6914" stroke-width="2"/>
  </g>
  <!-- Inner gear ring -->
  <circle cx="256" cy="256" r="160" fill="#0D0D0D" stroke="url(#brass)" stroke-width="6"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="#48494B" stroke-width="2"/>
  <!-- Center hub -->
  <circle cx="256" cy="256" r="80" fill="#1A1A1A" stroke="url(#brass)" stroke-width="4"/>
  <circle cx="256" cy="256" r="60" fill="#0D0D0D" stroke="#48494B" stroke-width="3"/>
  <!-- "R" letter in center -->
  <text x="256" y="280" font-family="'Oswald', 'Impact', sans-serif" font-size="90" font-weight="700"
    fill="url(#brassLight)" text-anchor="middle" letter-spacing="0.05em"
    filter="url(#glow)">R</text>
  <!-- Small rivets around inner ring -->
  <circle cx="256" cy="100" r="8" fill="#6B6C6F" stroke="#48494B" stroke-width="2"/>
  <circle cx="256" cy="412" r="8" fill="#6B6C6F" stroke="#48494B" stroke-width="2"/>
  <circle cx="100" cy="256" r="8" fill="#6B6C6F" stroke="#48494B" stroke-width="2"/>
  <circle cx="412" cy="256" r="8" fill="#6B6C6F" stroke="#48494B" stroke-width="2"/>
  <!-- Diagonal rivets -->
  <circle cx="146" cy="146" r="6" fill="#6B6C6F" stroke="#48494B" stroke-width="1.5"/>
  <circle cx="366" cy="146" r="6" fill="#6B6C6F" stroke="#48494B" stroke-width="1.5"/>
  <circle cx="146" cy="366" r="6" fill="#6B6C6F" stroke="#48494B" stroke-width="1.5"/>
  <circle cx="366" cy="366" r="6" fill="#6B6C6F" stroke="#48494B" stroke-width="1.5"/>
</svg>
